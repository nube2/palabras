<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#24204f" />
    <meta
      name="description"
      content="Practica vocabulario con frases en español de los niveles A2, B1 y B2."
    />
    <title>Palabras — Aprende español</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,700;9..144,800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="site-header">
        <a class="brand" href="./" aria-label="Inicio de Palabras">
          <span class="brand-mark" aria-hidden="true">P</span>
          <span>PALABRAS</span>
        </a>
        <p>Frases A2, B1 y B2 para practicar</p>
      </header>

      <section class="hero" aria-labelledby="page-title">
        <p class="eyebrow">Hablamos en North York</p>
        <h1 id="page-title">Elige tu práctica</h1>
        <p class="hero-copy">
          Selecciona el nivel de la frase y cuántas palabras quieres usar.
        </p>

        <div class="practice-picker">
          <fieldset class="picker-group">
            <legend>1. Elige el nivel de la frase</legend>
            <div class="level-picker">
              <button
                class="level-option"
                type="button"
                data-level="A2"
                aria-pressed="false"
              >
                <strong>A2</strong>
                <span>Elemental</span>
              </button>
              <button
                class="level-option"
                type="button"
                data-level="B1"
                aria-pressed="false"
              >
                <strong>B1</strong>
                <span>Intermedio</span>
              </button>
              <button
                class="level-option"
                type="button"
                data-level="B2"
                aria-pressed="false"
              >
                <strong>B2</strong>
                <span>Intermedio alto</span>
              </button>
            </div>
          </fieldset>

          <fieldset class="picker-group">
            <legend>2. Elige el número de palabras</legend>
            <div class="quantity-picker">
              <button
                class="quantity-option"
                type="button"
                data-count="2"
                disabled
              >
                <strong>2</strong>
                <span>palabras</span>
              </button>
              <button
                class="quantity-option"
                type="button"
                data-count="3"
                disabled
              >
                <strong>3</strong>
                <span>palabras</span>
              </button>
              <button
                class="quantity-option"
                type="button"
                data-count="4"
                disabled
              >
                <strong>4</strong>
                <span>palabras</span>
              </button>
            </div>
          </fieldset>
        </div>
      </section>

      <section
        id="lesson"
        class="lesson"
        aria-labelledby="lesson-title"
        aria-live="polite"
        tabindex="-1"
        hidden
      >
        <div class="lesson-header">
          <div>
            <p class="eyebrow">Tus palabras</p>
            <h2 id="lesson-title">Tus palabras son</h2>
          </div>
          <button id="change-options" class="text-button" type="button">
            Cambiar opciones
          </button>
        </div>

        <div id="word-grid" class="word-grid"></div>

        <div class="help-area">
          <button
            id="help-button"
            class="help-button"
            type="button"
            aria-expanded="false"
            aria-controls="sentence-reveal"
          >
            Ayúdame
          </button>
          <div id="sentence-reveal" class="sentence-reveal" hidden>
            <span id="sentence-level" class="sentence-level"></span>
            <p id="sentence-text" lang="es"></p>
          </div>
        </div>

        <button id="new-words" class="primary-button" type="button">
          <span>Ver otras palabras</span>
          <span aria-hidden="true">↻</span>
        </button>
      </section>

      <footer>Frases de los niveles A2, B1 y B2</footer>
    </main>

    <script src="data/sentences.js"></script>
    <script src="script.js"></script>
  </body>
</html>
